services:
  # ── Next.js application ──────────────────────────────────────────────
  app:
    build: .
    container_name: paperview-app
    restart: unless-stopped
    ports:
      - "7070:3000"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-paperview}:${MONGO_PASSWORD}@mongodb:27017/paperview?authSource=admin
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-admin}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD is required}
    volumes:
      - file-storage:/app/storage
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  # ── MongoDB ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: paperview-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-paperview}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USERNAME:-paperview}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

volumes:
  mongo-data:
  file-storage:

networks:
  app-network:
    driver: bridge
